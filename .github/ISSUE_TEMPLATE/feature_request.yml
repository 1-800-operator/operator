name: Feature request
description: Suggest a new capability, integration, or behavior change.
title: "[feature] "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Great. The more specific the problem you're trying to solve, the more likely the proposal lands.

        If this is a half-formed thought rather than a concrete proposal, **GitHub Discussions → Ideas** is a better home — it keeps the issue tracker focused on actionable work.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the situation, not the solution. What goes wrong today, or what's missing?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would the feature work from a user's perspective? Commands, flags, config, UX.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, and why this one wins. "Why not just use X?" is fair game.
    validations:
      required: false

  - type: dropdown
    id: contribution
    attributes:
      label: Would you be willing to contribute this?
      options:
        - "Yes — I'd open a PR if the direction is agreed."
        - "Maybe — depends on scope."
        - "No — flagging it for the maintainers."
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Mockups, links, related tools, prior art.
    validations:
      required: false
