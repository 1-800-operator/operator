name: Build aec3 universal binary

# AEC3 is the speaker-bleed cleaner that strips remote-meeting audio
# from the user's mic stream before whisper sees it. Without it,
# built-in-speaker users' mic transcripts include the other side of
# the call. The binary is built from Rust source at
# src/_1_800_operator/rust/aec3/, but the upstream
# webrtc-audio-processing-sys crate's meson build doesn't honor
# cargo's --target flag, so we can't cross-build x86_64 from arm64
# (or vice versa). Instead this workflow builds each arch on a
# native macOS runner, then lipos them into a universal binary and
# attaches it to the GitHub release. install.sh downloads it at
# install time.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-arch:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            target: aarch64-apple-darwin
            arch: arm64
          # `macos-13-large` (Intel, 12-core, paid ~$0.16/min) instead of
          # free `macos-13` — the free Intel runner pool is structurally
          # unavailable as of May 2026 (GitHub is winding down Intel
          # runners as Apple discontinues Intel). Five v0.1.31-v0.1.35
          # runs queued for 1h+ each on macos-13 without ever being
          # picked up; the paid runner clears the queue in ~5 min.
          # Recurring cost ~$0.80 per release.
          - runner: macos-13-large
            target: x86_64-apple-darwin
            arch: x86_64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # webrtc-audio-processing-sys's build.rs uses meson + ninja to
      # compile its C++ deps. GitHub macOS runners ship neither. brew
      # is preinstalled. pkg-config is needed for the wrapper layer.
      - name: Install build deps (meson, ninja, pkg-config)
        run: brew install meson ninja pkg-config

      - name: Ensure Rust target installed
        run: rustup target add ${{ matrix.target }}

      - name: Build aec3
        working-directory: src/_1_800_operator/rust/aec3
        # --locked pins to Cargo.lock; --frozen would also forbid network,
        # which breaks fresh CI runners with empty Cargo caches (S247).
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Verify architecture
        working-directory: src/_1_800_operator/rust/aec3
        run: |
          file target/${{ matrix.target }}/release/aec3
          file target/${{ matrix.target }}/release/aec3 | grep -q "${{ matrix.arch }}"

      # Smoke test on each arch's native runner — proves the binary
      # actually executes on real hardware before we ship it. macos-13 is
      # bare-metal Intel; macos-14 is bare-metal Apple Silicon. Without
      # this step we'd only have `file`-level verification.
      #
      # Test: generate 1s of silence as a 16 kHz mono WAV (matches aec3's
      # expected sample rate from main.rs), run aec3 in batch mode with
      # mic == ref == silence, expect a clean exit + non-empty output WAV.
      - name: Smoke test (native ${{ matrix.arch }})
        working-directory: src/_1_800_operator/rust/aec3
        run: |
          AEC3_BIN="target/${{ matrix.target }}/release/aec3"
          chmod +x "$AEC3_BIN"

          # Generate a 1-second silence WAV using python (preinstalled
          # on GitHub macOS runners). 16 kHz, mono, 16-bit PCM — aec3's
          # expected input shape per main.rs SAMPLE_RATE_HZ const.
          python3 - <<'PY'
          import wave, struct
          n = 16000  # 1 second at 16 kHz
          for path in ("silence_mic.wav", "silence_ref.wav"):
              with wave.open(path, "wb") as w:
                  w.setnchannels(1)
                  w.setsampwidth(2)
                  w.setframerate(16000)
                  w.writeframes(struct.pack(f"<{n}h", *([0] * n)))
          PY

          ls -la silence_mic.wav silence_ref.wav

          # Batch mode: --mic, --ref, --out (per main.rs Mode::Batch).
          # Exit code 0 + a non-empty WAV file is the success signal.
          "$AEC3_BIN" --mic silence_mic.wav --ref silence_ref.wav --out cleaned.wav

          if [ ! -s cleaned.wav ]; then
            echo "smoke test FAILED: cleaned.wav is empty or missing"
            exit 1
          fi

          # Sanity-check the output is a real WAV. `file` should say "RIFF"
          # / "WAVE audio".
          file cleaned.wav
          file cleaned.wav | grep -qi "WAVE\|RIFF"
          echo "smoke test PASSED on ${{ matrix.arch }}: cleaned.wav written, $(wc -c < cleaned.wav) bytes"

      - uses: actions/upload-artifact@v4
        with:
          name: aec3-${{ matrix.arch }}
          path: src/_1_800_operator/rust/aec3/target/${{ matrix.target }}/release/aec3
          retention-days: 7

  lipo-and-release:
    needs: build-arch
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: aec3-arm64
          path: ./arm64

      - uses: actions/download-artifact@v4
        with:
          name: aec3-x86_64
          path: ./x86_64

      - name: lipo into universal binary
        run: |
          chmod +x ./arm64/aec3 ./x86_64/aec3
          lipo -create ./arm64/aec3 ./x86_64/aec3 -output ./aec3-darwin-universal
          chmod +x ./aec3-darwin-universal
          file ./aec3-darwin-universal
          file ./aec3-darwin-universal | grep -q "Mach-O universal"

      - name: SHA256 checksum
        run: shasum -a 256 ./aec3-darwin-universal | tee ./aec3-darwin-universal.sha256

      - name: Attach to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./aec3-darwin-universal
            ./aec3-darwin-universal.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
