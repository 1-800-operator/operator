# Codex ‚Äî agent's brain is the OpenAI Codex CLI run via `codex mcp-server`
# under your ChatGPT subscription. The codex MCP server is plumbed below
# under `mcp_servers.codex`; operator's MCPClient owns its lifecycle.
#
# Requires the `codex` CLI installed (`npm install -g @openai/codex`) and
# logged in (`codex login`). `operator run codex` hard-fails without it.
#
# Differences vs the claude agent (intentional, scoped to v1):
#   - No CLAUDE.md / project-memory mirror ‚Äî codex reads AGENTS.md /
#     CLAUDE.md from cwd itself, so passing it twice would double context.
#   - No `skills:` block ‚Äî codex auto-loads `~/.codex/skills/` itself; an
#     operator-side overlay wouldn't reach codex's subprocess. Wizard
#     surfaces them read-only.
#   - Captions disabled ‚Äî codex's mcp-server mode doesn't yet expose a way
#     to inherit operator's bundled transcript MCP. v1 codex sees only chat
#     messages, not spoken audio. Tracking: roadmap ‚Üí "codex caption parity".
#   - No fnmatch auto_approve / always_ask lists ‚Äî codex's internal
#     safe-allowlist already filters read-class commands before they reach
#     operator. Only `default_approval_policy` + `default_sandbox` here.

agent:
  name: "Codex"
  trigger_phrase: "@codex"
  first_contact_hint: "(First time talking to {first_name} ‚Äî greet them by name once, then drop it.)"
  tagline: "OpenAI Codex CLI in your meeting ‚Äî sandboxed shell + chat-gated approvals"
  intro_on_join: true
  # Voice ‚Äî controls how the bot communicates across three surfaces:
  # progress narrator, confirmation prompts, and reply content.
  #   plain     ‚Äî meeting-friendly. Confirmation prompts strip the
  #               `/bin/zsh -lc` wrapper and show the inner command:
  #               "Run? `echo hi > /tmp/x.txt` in `/tmp`". Reply content
  #               steered toward everyday language by the system_prompt
  #               directive.
  #   technical ‚Äî full argv dump in confirmation prompts. Reply content
  #               keeps file:line citations and code blocks. Useful when
  #               you want full transparency over readability.
  voice: plain

llm:
  # Codex IS the LLM. No `model` / `history_messages` ‚Äî codex picks its
  # own model and owns its own context window per thread.
  provider: "codex_mcp"

# Captions DISABLED in v1 ‚Äî see header note above.
transcript:
  captions_enabled: false

# Approval / sandbox knobs for the codex MCP-server brain. Take effect on
# every `codex(...)` / `codex-reply(...)` call.
#
# default_approval_policy:
#   never        ‚Äî codex runs every command without asking. Fast but you
#                  give up the chat-confirmation safety net.
#   on-request   ‚Äî codex's model judges when to escalate (DEFAULT). Far
#                  less noisy than `untrusted` for chat-driven use.
#   on-failure   ‚Äî codex retries with escalation only after a sandbox
#                  rejection.
#   untrusted    ‚Äî codex elicits on EVERY non-allowlisted command. Most
#                  paranoid; very chatty.
#
# default_sandbox:
#   read-only        ‚Äî DEFAULT. Filesystem reads OK, writes blocked at OS
#                      level until an approved escalation grants the
#                      specific command.
#   workspace-write  ‚Äî writes to cwd permitted; outside cwd still blocked.
#   danger-full-access ‚Äî no sandbox. Use with extreme care.
#
# Edit via `operator edit codex` for per-meeting tightening / loosening.
permissions:
  default_approval_policy: on-request
  default_sandbox: read-only

# MCP servers. The codex brain itself is plumbed here as a normal entry ‚Äî
# operator's MCPClient spawns `codex mcp-server`, discovers its `codex`
# and `codex-reply` tools, and the CodexMCPProvider drives them.
#
# `OPENAI_API_KEY: ""` clears the env var at spawn time so Codex falls
# through to ChatGPT subscription auth even if the user has an API key
# set in `~/.operator/.env`. Defense layer 1 of the subscription billing
# guard; layer 2 is the `codex login status` preflight in __main__.py.
mcp_servers:
  codex:
    command: codex
    args: [mcp-server]
    env:
      OPENAI_API_KEY: ""
    description: "Codex CLI in MCP-server mode (the agent's brain)"
    enabled: true

# Skills ‚Äî INTENTIONALLY ABSENT. Codex IS the harness for this agent
# (operator just spawns `codex mcp-server` and relays chat), so codex
# auto-loads `~/.codex/skills/` itself at runtime. Operator's skills
# loader is not bridged to codex's subprocess, so any `skills:` block
# here would be dead weight. The setup/edit wizard surfaces the
# inherited set as a read-only panel; manage skills via codex directly
# (skill folders under `~/.codex/skills/`).
#
# Permissions ‚Äî only `default_approval_policy` + `default_sandbox` above.
# Operator's `auto_approve` / `always_ask` fnmatch lists (used by the
# claude agent) are INTENTIONALLY ABSENT here too: codex's internal
# safe-allowlist filters read-class commands before they reach
# operator, and chat-gated approval rides codex's own elicitation flow,
# so operator-side allowlists would never fire.

# System prompt ‚Äî USER addition (voice + always-on rules in one free-form
# text block). The framework voice + always-on rules live in
# `agents/codex/framework.py:FRAMEWORK_SYSTEM_PROMPT` and are composed
# under the hood. Anything below is appended on top.
system_prompt: ""
