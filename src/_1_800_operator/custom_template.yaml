# Custom-bot template — the from-scratch baseline used by `operator build`
# when the user picks the "custom" path in step 1. Not a runnable agent in
# its own right; the wizard reads this file, fills in the user's chosen
# `agent` block, and writes the result to `~/.operator/agents/<name>/`.
#
# All MCP servers ship `enabled: false` — the user opts in per bot via the
# wizard's MCP picker. Versions are pinned so runtime behavior stays
# stable through launch; bump deliberately when upstream ships a fix or
# feature you want.
#
# Secrets (API keys) stay in ~/.operator/.env — this file is safe to
# commit and share.

agent:
  name: ""
  trigger_phrase: ""
  first_contact_hint: "(First time talking to {first_name} — greet them by name once, then drop it.)"
  tagline: ""
  intro_on_join: true
  # voice — controls how the bot communicates across three surfaces:
  # progress narrator, confirmation prompts, and reply content.
  #   plain     — meeting-friendly. Translates tool names and args into
  #               plain English.
  #   technical — developer-flavored. Tool names verbatim with full
  #               parameter dump in confirmation prompts.
  voice: plain

llm:
  provider: "anthropic"
  model: "claude-sonnet-4-5"
  history_messages: 40

# Captions off by default for custom bots — opt in per agent when the bot
# benefits from hearing spoken content (e.g. drafts-from-discussion).
transcript:
  captions_enabled: false

# MCP servers — full bundled gallery. All shipped `enabled: false`; the
# wizard's MCP picker is where the user toggles them on.
mcp_servers:
  calendar:
    enabled: false
    description: "read your Google Calendar — list events, find free time, pull agenda"
    # @cocal/google-calendar-mcp is the most-adopted Calendar-only MCP (fork of
    # nspady/google-calendar-mcp). Auth is local OAuth: user downloads a
    # credentials.json from Google Cloud Console once; the server handles the
    # rest (including refresh). GOOGLE_OAUTH_CREDENTIALS is the absolute path
    # to that file, not a token. Google's own `gws` CLI (March 2026) bundles
    # all Workspace MCPs together — swap if you also want Drive/Gmail/Docs.
    credentials_url: "https://console.cloud.google.com/apis/credentials"
    auth: env
    command: "npx"
    args: ["-y", "@cocal/google-calendar-mcp@latest"]
    env:
      GOOGLE_OAUTH_CREDENTIALS: "${GOOGLE_OAUTH_CREDENTIALS}"
    read_tools:
      - list-calendars
      - list-events
      - search-events
      - get-event
      - get-freebusy
      - get-current-time
    confirm_tools: []
    hints: |
      When the user asks to check someone's availability, use get-freebusy with attendee emails rather than inferring conflicts from list-events.
      For "my calendar" requests, list-calendars first so you know which calendar ID to query — users often have multiple (personal, work, team).
      Convert relative dates ("tomorrow at 3") into RFC3339 timestamps with the user's timezone before calling list-events or create-event.
      When surfacing an event, lead with title + start time (human-readable, user timezone) + attendees. Skip event IDs and raw URLs unless asked.
      If search-events returns nothing, say so plainly — do not fabricate events from memory.

  claude-code:
    enabled: false
    description: "spin up a Claude Code instance to write code for you, from inside the meeting"
    # Prereq check (not a token) — wizard verifies the `claude` CLI is installed
    # and logged in. If not, this URL is surfaced in the status screen.
    credentials_url: "https://docs.claude.com/en/docs/claude-code/overview"
    command: "python"
    args: ["-m", "_1_800_operator.mcp_servers.claude_code"]
    env:
      # bypassPermissions = auto-approve every tool (incl. Bash). acceptEdits =
      # file edits auto-run, Bash is blocked. Operator confirm-gates each
      # delegate call either way, and --worktree isolates file changes.
      CLAUDE_CODE_PERMISSION_MODE: "bypassPermissions"
    read_tools: []
    confirm_tools: []
    hints: |
      delegate_to_claude_code requires repo_path (absolute local path to a git repo). On the first delegation in a chat, ask the user which repo to work in — do not guess.
      Reuse the same repo_path for follow-ups (edits, verification, extensions) — Claude Code resumes the sandbox and conversation automatically. Switch repo_path only when the user names a different repo.
      The task string should be a clear, self-contained instruction. Include file paths, function names, or repo context when the user has provided them.
      Tool result footer includes [workdir: ...] and [repo: ...] lines — mention the workdir when reporting back so the user knows changes are sandboxed, not in their working tree.
      After a successful delegation, offer to land the changes with land_worktree_changes (same repo_path) — it applies the sandbox diff into the user's working tree.
      land_worktree_changes only works after a delegate_to_claude_code call for the same repo_path this chat.

  figma:
    enabled: false
    description: "read frames, components, and exports from your Figma files (read-only)"
    credentials_url: "https://www.figma.com/developers/api#access-tokens"
    # GLips community server (https://github.com/GLips/Figma-Context-MCP) — Figma PAT,
    # read-only. Chosen as the default after the official server's OAuth dynamic-client
    # registration returned 403 (Figma's MCP catalog gate is hard, not soft).
    # If Operator is added to Figma's catalog, swap to the official server — see README.
    command: "npx"
    args: ["-y", "figma-developer-mcp@0.10.1", "--stdio"]
    env:
      FIGMA_API_KEY: "${FIGMA_TOKEN}"
    read_tools:
      - get_figma_data
      - download_figma_images
    confirm_tools: []
    hints: |
      Always pass the file key from a Figma URL the user provides; do not invent file keys.
      A Figma URL looks like figma.com/design/<fileKey>/<name>?node-id=<nodeId>. Extract fileKey from the path and nodeId from the query string. node-id "2-2" in a URL becomes "2:2" in the API.
      When the user says "the login screen" or "the carousel", confirm which file they mean before fetching — don't guess across files.
      Prefer the smallest-scoped fetch: a single node-id over a whole-file fetch. Whole-file fetches return enormous payloads.
      For images, request PNG at 1x unless the user asks for a higher resolution; downloaded image data inflates the tool result.
      When summarizing a frame: layout shape (vertical stack, grid, etc.) + dominant typography + 1-2 spacing or hierarchy observations. Do not narrate every node.
      If get_figma_data returns a thin payload (e.g. a single RECTANGLE when the user expected a multi-node frame), say so plainly and ask for a different node-id or the layers panel — do not fabricate structure that isn't in the result.

  github:
    enabled: false
    description: "read and write code, PRs, and issues across your GitHub repos"
    credentials_url: "https://github.com/settings/tokens"
    command: "github-mcp-server"
    args: ["stdio"]
    read_tools:
      - get_me
      - get_file_contents
      - get_commit
      - get_tag
      - get_label
      - get_latest_release
      - get_release_by_tag
      - list_branches
      - list_commits
      - list_issues
      - list_pull_requests
      - list_releases
      - list_tags
      - get_team_members
      - get_teams
      - search_code
      - search_issues
      - search_pull_requests
      - search_repositories
      - search_users
      - issue_read
      - pull_request_read
    confirm_tools: []
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_TOKEN}"
    hints: |
      When reading a file on a non-default branch, always pass ref=<branch>. Without ref, the API silently returns the main branch copy or 404.
      search_code can return 0 results even when matching code exists (GitHub's search index has delays). Empty results don't mean the code is absent.
      When the user refers to "my repo" or "our repo", scope search_repositories with user:<login> (from get_me) or org:<org>. Unscoped queries return tens of thousands of unrelated results.
      Set minimal_output=true on search tools when full API objects are not needed.
      For directory navigation, a single-level listing is fine. Do not traverse recursively — directory entries are verbose.
      If a write tool returns HTTP 403 "Resource not accessible by personal access token", the PAT is missing permissions — tell the user rather than retrying.
      To explore a repo, use get_file_contents to list directories and read files. Start from the root or the path the user mentions. Never guess file paths.
      For multi-step tasks (e.g. list directory then read a file), chain tool calls without pausing to narrate intermediate steps.
      When summarizing: filename + 1-2 sentences on actual content. No search narration. Never describe a file's likely contents — read it first.

  linear:
    enabled: false
    description: "file, query, and update Linear tickets the moment decisions land"
    auth: oauth
    auth_url: "https://mcp.linear.app/mcp"
    credentials_url: "https://linear.app/settings/account/security"
    command: "npx"
    args: ["-y", "mcp-remote@0.1.38", "https://mcp.linear.app/mcp"]
    read_tools:
      - list_issues
      - get_issue
      - get_issue_status
      - list_issue_statuses
      - list_projects
      - get_project
      - list_teams
      - get_team
      - list_users
      - get_user
      - list_cycles
      - list_milestones
      - get_milestone
      - list_documents
      - get_document
      - list_comments
      - list_issue_labels
      - list_project_labels
      - search_documentation
      - get_attachment
      - extract_images
    confirm_tools: []
    hints: |
      Always set includeArchived=false unless the user explicitly asks for archived issues.
      When the user specifies a state, use state types (unstarted, started, backlog, completed, canceled) not display names.
      For issue detail, use get_issue not list_issues — list_issues truncates descriptions.
      When creating an issue from a spoken commitment, include the speaker as assignee if their Linear identity is known; otherwise leave unassigned and mention it in chat.
      Scope list_issues with teamId or projectId when the user names a team or project — unscoped queries return too many results.
      Prefer save_issue over create_issue + update_issue pairs; it's idempotent.

  notion:
    enabled: false
    description: "read and write Notion pages and databases"
    credentials_url: "https://www.notion.so/profile/integrations"
    command: "npx"
    args: ["-y", "@notionhq/notion-mcp-server@2.2.1"]
    env:
      NOTION_API_KEY: "${NOTION_API_KEY}"
    read_tools: []
    confirm_tools: []
    hints: ""

  playwright:
    enabled: false
    description: "drive a real browser inside the meeting — navigate, click, screenshot, inspect"
    # Microsoft's official @playwright/mcp. No auth or env vars — the server
    # spawns and manages a Chromium browser locally. Persistent profile lives
    # in the platform cache dir (ms-playwright/mcp-*-profile). The wizard has
    # no credential to check, so the readiness screen shows ok on enable.
    credentials_url: "https://github.com/microsoft/playwright-mcp"
    auth: env
    command: "npx"
    args: ["-y", "@playwright/mcp@0.0.70"]
    env: {}
    read_tools:
      - browser_snapshot
      - browser_console_messages
      - browser_network_requests
      - browser_take_screenshot
      - browser_tabs
    confirm_tools: []
    hints: |
      browser_navigate opens a real page — treat it as a side effect. Do not navigate just to "check" something; ask the user first when the target is non-obvious.
      Prefer browser_snapshot over browser_take_screenshot for element-level reasoning — snapshots return structured DOM; screenshots are bytes only useful for humans.
      When clicking or typing, identify the element from a prior snapshot's ref — do not guess selectors.
      The server keeps browser state across calls in this chat. A login on one page persists into the next — useful and dangerous.

  salesforce:
    enabled: false
    description: "query Salesforce CRM — accounts, opportunities, contacts, reports"
    # Salesforce's official @salesforce/mcp. Auth is delegated to the `sf` CLI:
    # user installs sf and runs `sf org login web` once; the MCP reads the
    # local auth cache. There is no env token — that's why env is empty.
    credentials_url: "https://developer.salesforce.com/tools/salesforcecli"
    auth: env
    command: "npx"
    args: ["-y", "@salesforce/mcp@latest", "--orgs", "DEFAULT_TARGET_ORG"]
    env: {}
    read_tools:
      - run_soql_query
      - list_all_orgs
      - get_username
      - describe_code_analyzer_rule
      - query_code_analyzer_results
    confirm_tools: []
    hints: |
      Prefer run_soql_query with a narrow WHERE clause over list queries — unscoped SOQL can return tens of thousands of rows.
      When the user says "my pipeline" or "this quarter's deals", scope by OwnerId (from get_username) and CloseDate, not by guessing account names.
      Salesforce object names are PascalCase (Account, Opportunity, Contact); field names follow the org's schema (Name, StageName, CloseDate, Amount). Do not invent field names.
      If a SOQL query errors with "No such column", run describe against the object first — org-specific custom fields vary.
      When summarizing a record, lead with Name + key stage/amount + owner. Do not dump every field.

  sentry:
    enabled: false
    description: "read Sentry issues and events — triage prod errors from the meeting"
    # Sentry's official hosted remote MCP via mcp-remote. OAuth via DCR (no
    # app registration) — first run pops a browser tab for consent, the token
    # lands in ~/.mcp-auth/mcp-remote-<ver>/<md5(auth_url)>_tokens.json and
    # the wizard pre-checks for it. Same pattern as Linear.
    auth: oauth
    auth_url: "https://mcp.sentry.dev/mcp"
    credentials_url: "https://sentry.io/settings/account/api/authorizations/"
    command: "npx"
    args: ["-y", "mcp-remote@0.1.38", "https://mcp.sentry.dev/mcp"]
    read_tools:
      - find_organizations
      - find_projects
      - search_issues
      - search_events
      - get_issue_details
      - list_issue_events
    confirm_tools: []
    hints: |
      Scope every search by organizationSlug and projectSlug — unscoped queries hit every project and return noise.
      For a specific error, start with search_issues (aggregated) then drill into get_issue_details + list_issue_events for stack traces.
      When surfacing an issue, lead with title + event count + first-seen/last-seen + one example stack frame. Dumping full events is noise.
      Sentry search uses its own query syntax (is:unresolved level:error release:foo@1.2.3). Copy the user's filter literally rather than translating.
      If an event count is 1 and first-seen = last-seen, it's a one-off — call that out rather than treating it as an active incident.

  slack:
    enabled: false
    description: "read Slack channels and DMs, send messages, react, update status"
    # @modelcontextprotocol/server-slack is the archived-but-still-widely-used
    # reference server (archived May 2025). For active maintenance, swap to
    # @zencoderai/slack-mcp-server — drop-in, same env vars, same tool names.
    credentials_url: "https://api.slack.com/apps"
    auth: env
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-slack@latest"]
    env:
      SLACK_BOT_TOKEN: "${SLACK_BOT_TOKEN}"
      SLACK_TEAM_ID:   "${SLACK_TEAM_ID}"
    read_tools:
      - slack_list_channels
      - slack_get_channel_history
      - slack_get_thread_replies
      - slack_get_users
      - slack_get_user_profile
    confirm_tools: []
    hints: |
      Prefer slack_get_thread_replies over channel history when the user references a specific thread URL — it returns the thread scope cleanly.
      Channel names in tools need IDs (C01234567), not display names (#general). Use slack_list_channels to resolve.
      When posting a message, confirm the channel explicitly — accidental posts to #general are visible and embarrassing.
      User mentions use <@U01234567> syntax; convert display names via slack_get_users first. Raw @name strings don't ping.
      For summaries, lead with who-said-what (display name + one-line quote) rather than raw timestamps.

# Skills — start empty; user picks from the bundled gallery via the wizard.
# external_paths can list extra skill locations (tilde-prefixed or absolute).
skills:
  enabled: []
  external_paths: []
  progressive_disclosure: true

# System prompt — voice + always-on rules in one free-form text block.
# Authored via the wizard's system-prompt step.
system_prompt: ""
